<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current State — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  /* Spacer to allow scroll-trigger testing */
  .scroll-spacer { height: 60vh; display: flex; align-items: center; justify-content: center; color: #334155; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── Password Gate ── */
    #password-gate {
      position: fixed; inset: 0; z-index: 99999;
      background: #0f2440;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1.2rem;
    }
    #password-gate.unlocked { display: none; }
    #password-gate h2 { color: #fff; font-size: 1.6rem; font-weight: 500; }
    #password-gate input {
      padding: 0.75rem 1.2rem; font-size: 1.1rem;
      border: 2px solid #00b4d8; border-radius: 8px;
      background: #fff; text-align: center; width: 240px; outline: none;
    }
    #password-gate button {
      padding: 0.7rem 2rem; font-size: 1rem; font-weight: 600;
      background: #00b4d8; color: #fff; border: none; border-radius: 8px; cursor: pointer;
    }
    #password-gate .error { color: #ff6b6b; font-size: 0.9rem; min-height: 1.2em; }
    #app-content { display: none; }
    #app-content.visible { display: block; }

  </style>
</head>
<body>

  <div id="password-gate">
    <h2>Enter Access Code</h2>
    <input type="password" id="gate-pw" placeholder="Access code" autofocus>
    <button onclick="checkPw()">Enter</button>
    <div class="error" id="gate-err"></div>
  </div>
  <div id="app-content">

<div class="scroll-spacer">Scroll down</div>

<!-- Include the section -->
<div id="section-include"></div>

<div class="scroll-spacer" style="height:40vh"></div>

<script>
  fetch('section-current-state.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('section-include').innerHTML = html;
      // Re-run any inline scripts
      document.getElementById('section-include').querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        s.textContent = old.textContent;
        old.parentNode.replaceChild(s, old);
      });
    });
</script>

  </div><!-- /app-content -->
  <script>
    function checkPw(){
      if(document.getElementById('gate-pw').value==='7777'){
        document.getElementById('password-gate').classList.add('unlocked');
        document.getElementById('app-content').classList.add('visible');
        sessionStorage.setItem('pw-ok','1');
      } else {
        document.getElementById('gate-err').textContent='Incorrect code';
      }
    }
    document.getElementById('gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});
    if(sessionStorage.getItem('pw-ok')==='1'){document.getElementById('gate-pw').value='7777';checkPw();}
  </script>

</body>
</html>
